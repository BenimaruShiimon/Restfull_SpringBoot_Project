<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Add User</title>
</head>
<body>
<h1>Add User</h1>
<form th:object="${user}" th:action="@{/ui/users/add}" method="post">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your name" th:field="*{name}" required><br>

    <label for="birthDate">Birth date:</label>
    <input type="date" id="birthDate" name="birthDate" th:field="*{birthDate}" required><br>

    <label for="phone">Phone:</label>
    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" th:field="*{phone}" required><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" th:field="*{email}" required><br>

    <button type="submit">Add</button>
</form>
<a th:href="@{/ui/users}">Back to User List</a>
</body>
</html>
